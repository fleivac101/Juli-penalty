<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Penalty Idiomas Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --amarillo: #fbbf24;
  --verde: #16a34a;
  --verde-claro: #22c55e;
  --rojo: #ef4444;
  --azul: #3b82f6;
  --gris: #94a3b8;
  --bg: #080c18;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:#f1f5f9;
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(22,163,74,.12) 0,transparent 55%),
    radial-gradient(ellipse at 85% 85%,rgba(59,130,246,.1) 0,transparent 55%);
  pointer-events:none;z-index:0;
}

/* ===== PANTALLAS ===== */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ===== PANTALLA MAPA ===== */
#mapScreen{
max-width:420px;margin:0 auto;padding:12px;
}
#mapHeader{
display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px;
}
#mapTitulo{
font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:2px;
background:linear-gradient(135deg,var(–amarillo),#f97316);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#mapStats{display:flex;gap:8px;}
.badge{
background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;
}
.badge span{color:var(–amarillo);}

/* Selector idioma */
#langRow{display:flex;gap:8px;margin-bottom:14px;}
.lbtn{
flex:1;padding:10px;border:2px solid transparent;border-radius:12px;
font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;color:#fff;
}
.lbtn.en{background:rgba(0,48,135,.4);border-color:rgba(0,48,135,.6);}
.lbtn.it{background:rgba(0,140,69,.4);border-color:rgba(0,140,69,.6);}
.lbtn.active.en{background:#003087;border-color:#fff;box-shadow:0 0 15px rgba(0,48,135,.8);}
.lbtn.active.it{background:#008c45;border-color:#fff;box-shadow:0 0 15px rgba(0,140,69,.8);}

/* Ligas / Mundos */
.liga-section{margin-bottom:18px;}
.liga-header{
display:flex;align-items:center;gap:10px;margin-bottom:10px;
padding:10px 14px;border-radius:14px;
}
.liga-header.bronco{background:linear-gradient(135deg,rgba(180,83,9,.3),rgba(120,53,15,.2));border:1px solid rgba(180,83,9,.4);}
.liga-header.plata{background:linear-gradient(135deg,rgba(100,116,139,.3),rgba(71,85,105,.2));border:1px solid rgba(100,116,139,.4);}
.liga-header.oro{background:linear-gradient(135deg,rgba(161,138,0,.3),rgba(120,90,0,.2));border:1px solid rgba(161,138,0,.4);}
.liga-header.diamante{background:linear-gradient(135deg,rgba(6,182,212,.3),rgba(8,145,178,.2));border:1px solid rgba(6,182,212,.4);}
.liga-icono{font-size:28px;}
.liga-info h3{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1px;}
.liga-info p{font-size:11px;color:var(–gris);text-transform:uppercase;letter-spacing:1px;}

/* Niveles grid */
.niveles-grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
padding:0 4px;
}
.nivel-card{
aspect-ratio:1;border-radius:14px;border:2px solid transparent;
display:flex;flex-direction:column;align-items:center;justify-content:center;
cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
font-family:‘Bebas Neue’,sans-serif;
}
.nivel-card.bloqueado{
background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);cursor:not-allowed;
}
.nivel-card.bloqueado .nnum{color:rgba(255,255,255,.2);font-size:18px;}
.nivel-card.disponible{
background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);
}
.nivel-card.disponible:hover{transform:scale(1.06);background:rgba(255,255,255,.14);}
.nivel-card.completado{border-color:var(–verde-claro);background:rgba(22,163,74,.15);}
.nivel-card.completado:hover{transform:scale(1.06);}
.nivel-card.perfecto{border-color:var(–amarillo);background:rgba(251,191,36,.15);}
.nivel-card.actual{
border-color:var(–amarillo);background:rgba(251,191,36,.2);
box-shadow:0 0 16px rgba(251,191,36,.4);animation:pulso .8s ease infinite alternate;
}
@keyframes pulso{from{box-shadow:0 0 10px rgba(251,191,36,.3);}to{box-shadow:0 0 22px rgba(251,191,36,.6);}}
.nnum{font-size:20px;line-height:1;}
.nestrellas{font-size:10px;margin-top:2px;min-height:12px;}
.nbloqueo{font-size:16px;opacity:.3;}

/* ===== PANTALLA JUEGO ===== */
#gameScreen{max-width:420px;margin:0 auto;padding:10px;}
#gameHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 0 8px;}
#btnVolver{
background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;cursor:pointer;font-family:‘Nunito’,sans-serif;font-weight:700;
}
#gameInfo{text-align:right;}
#gameNivelLabel{font-family:‘Bebas Neue’,sans-serif;font-size:16px;color:var(–amarillo);letter-spacing:1px;}
#gameStats2{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}

/* Barra dificultad */
#difBarra{
display:flex;align-items:center;gap:8px;margin-bottom:8px;
padding:6px 12px;border-radius:10px;background:rgba(255,255,255,.05);
}
#difLabel{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
#difLabel.facil{color:#22c55e;}
#difLabel.medio{color:#fbbf24;}
#difLabel.dificil{color:#ef4444;}
#difLabel.experto{color:#a855f7;}
#progRondaBar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
#progRondaFill{height:100%;background:linear-gradient(90deg,var(–amarillo),#f97316);border-radius:3px;transition:width .4s ease;}
#progRondaTexto{font-size:11px;color:var(–gris);white-space:nowrap;}

/* Pregunta */
#tarjeta{
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
border-radius:20px;padding:16px;margin:8px 0;text-align:center;
}
#catLabel{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(–gris);margin-bottom:4px;}
#wordBig{
font-family:‘Bebas Neue’,sans-serif;font-size:44px;letter-spacing:3px;line-height:1.1;
margin-bottom:2px;
}
#wordEj{font-size:12px;color:var(–gris);font-style:italic;}

/* Opciones */
#opciones{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.opt{
padding:13px 8px;border:2px solid rgba(255,255,255,.15);border-radius:14px;
background:rgba(255,255,255,.06);color:#fff;font-family:‘Nunito’,sans-serif;
font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;
}
.opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:scale(1.03);}
.opt.correcta{background:rgba(22,163,74,.5);border-color:var(–verde-claro);box-shadow:0 0 20px rgba(22,163,74,.5);animation:popVerde .4s ease;}
.opt.incorrecta{background:rgba(239,68,68,.4);border-color:var(–rojo);animation:shake .4s ease;}
@keyframes popVerde{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* Puntos flotantes */
#ptsFlotante{text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:22px;min-height:28px;color:var(–amarillo);}

/* Power */
#powerSec{display:none;margin:6px 0;}
#powerLbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–gris);margin-bottom:4px;text-align:center;}
#powerWrap{height:20px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
#powerFill{height:100%;width:0%;border-radius:10px;transition:width .04s;}

/* Racha dots */
#rachaDots{display:flex;justify-content:center;gap:5px;margin:5px 0;min-height:16px;}
.rdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
.rdot.ok{background:var(–verde-claro);box-shadow:0 0 6px var(–verde-claro);}
.rdot.fail{background:var(–rojo);box-shadow:0 0 6px var(–rojo);}
.rdot.now{background:var(–amarillo);box-shadow:0 0 8px var(–amarillo);animation:pulso .6s infinite alternate;}

/* Cancha */
#cancha{
width:100%;max-width:400px;height:185px;
background:linear-gradient(180deg,#14532d 0%,#15803d 40%,#16a34a 100%);
border-radius:16px;position:relative;overflow:visible;
border:3px solid rgba(255,255,255,.2);margin:8px auto;
}
#cancha::before{
content:’’;position:absolute;bottom:0;left:10%;right:10%;
height:55px;border:2px solid rgba(255,255,255,.2);border-top:none;border-radius:0 0 8px 8px;
}
#arco{
position:absolute;top:-8px;left:50%;transform:translateX(-50%);
width:155px;height:65px;border:5px solid white;border-bottom:none;
border-radius:4px 4px 0 0;background:rgba(255,255,255,.07);z-index:2;
}
#arco::after{
content:’’;position:absolute;inset:0;
background-image:linear-gradient(rgba(255,255,255,.12) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.12) 1px,transparent 1px);
background-size:16px 13px;
}
#arquero{
position:absolute;top:12px;left:50%;transform:translateX(-50%);
font-size:30px;transition:left .4s cubic-bezier(.34,1.56,.64,1),transform .4s;z-index:3;
filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
#balon{
position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
font-size:26px;transition:all .6s cubic-bezier(.34,1.56,.64,1);z-index:4;
filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));
}

/* Zonas */
#zonas{display:flex;gap:8px;margin:6px 0;display:none;}
.zbtn{
flex:1;padding:12px 4px;border:2px solid rgba(255,255,255,.2);border-radius:12px;
background:rgba(255,255,255,.07);color:#fff;font-size:20px;cursor:pointer;transition:all .2s;
font-family:‘Nunito’,sans-serif;font-weight:700;
}
.zbtn:hover{background:rgba(255,255,255,.15);transform:scale(1.05);}
.zbtn span{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(–gris);margin-top:2px;}

/* Resultado */
#resTexto{
text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:36px;
letter-spacing:3px;min-height:46px;transition:all .3s;
}
#resTexto.gol{color:var(–verde-claro);text-shadow:0 0 30px rgba(34,197,94,.8);}
#resTexto.fail{color:var(–rojo);text-shadow:0 0 20px rgba(239,68,68,.6);}
#comboDiv{text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–amarillo);min-height:24px;letter-spacing:2px;}

/* ===== MODAL RESUMEN ===== */
#modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
z-index:50;justify-content:center;align-items:center;
}
#modal.open{display:flex;}
#modalCard{
background:linear-gradient(135deg,#0f2444,#080c18);
border:2px solid var(–amarillo);border-radius:24px;
padding:32px 28px;text-align:center;width:320px;max-width:90vw;
animation:entrada .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes entrada{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
#modalEmoji{font-size:50px;margin-bottom:8px;}
#modalTitulo{font-family:‘Bebas Neue’,sans-serif;font-size:32px;color:var(–amarillo);letter-spacing:2px;}
#modalEstrellas{font-size:28px;margin:8px 0;}
#modalStats{font-size:15px;color:var(–gris);margin:6px 0;}
#modalMsg{font-size:16px;font-weight:700;margin:8px 0 16px;}
.modalBtns{display:flex;gap:10px;justify-content:center;}
.mbtn{
padding:12px 22px;border:none;border-radius:50px;
font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .2s;
}
.mbtn.pri{background:linear-gradient(135deg,var(–amarillo),#f97316);color:#080c18;}
.mbtn.sec{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.mbtn:hover{transform:scale(1.05);}

/* Emoji volador */
.efloat{
position:fixed;font-size:26px;pointer-events:none;
animation:flotar 1.2s ease-out forwards;z-index:100;
}
@keyframes flotar{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-110px) scale(1.5);}}

/* TOOLTIP en nivel card */
.nivel-card .ntip{
display:none;position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
background:#1e293b;border:1px solid rgba(255,255,255,.2);border-radius:6px;
padding:3px 8px;font-size:10px;white-space:nowrap;color:#fff;z-index:10;pointer-events:none;
}
.nivel-card:hover .ntip{display:block;}
</style>

</head>
<body>

<!-- ===== PANTALLA MAPA ===== -->

<div id="mapScreen" class="screen active">
<div id="mapHeader">
  <div id="mapTitulo">⚽ PENALTY IDIOMAS</div>
  <div id="mapStats">
    <div class="badge">🎯 <span id="totalPts">0</span></div>
    <div class="badge">⭐ <span id="totalEstrellas">0</span></div>
  </div>
</div>

<div id="langRow">
  <button class="lbtn en active" onclick="setLang('en')">🇬🇧 Inglés</button>
  <button class="lbtn it" onclick="setLang('it')">🇮🇹 Italiano</button>
</div>

<div id="mapContenido"></div>
</div>

<!-- ===== PANTALLA JUEGO ===== -->

<div id="gameScreen" class="screen">
<div id="gameHeader">
  <button id="btnVolver" onclick="volverMapa()">← Mapa</button>
  <div id="gameInfo">
    <div id="gameNivelLabel">NIVEL 1</div>
    <div id="gameStats2">
      <div class="badge">🎯 <span id="gPts">0</span></div>
      <div class="badge">🔥 <span id="gRacha">0</span></div>
    </div>
  </div>
</div>

<div id="difBarra">
  <div id="difLabel">FÁCIL</div>
  <div id="progRondaBar"><div id="progRondaFill" style="width:0%"></div></div>
  <div id="progRondaTexto">0/5</div>
</div>

<div id="tarjeta">
  <div id="catLabel">CATEGORÍA</div>
  <div id="wordBig">...</div>
  <div id="wordEj"></div>
</div>

<div id="opciones"></div>
<div id="comboDiv"></div>
<div id="ptsFlotante"></div>

<div id="powerSec">
  <div id="powerLbl">💥 POTENCIA DEL DISPARO</div>
  <div id="powerWrap"><div id="powerFill"></div></div>
</div>

<div id="rachaDots"></div>

<div id="cancha">
  <div id="arco"></div>
  <div id="arquero">🧤</div>
  <div id="balon">⚽</div>
</div>

<div id="zonas">
  <button class="zbtn" onclick="disparar('izq')">⬅️<span>Izquierda</span></button>
  <button class="zbtn" onclick="disparar('cen')">⬆️<span>Centro</span></button>
  <button class="zbtn" onclick="disparar('der')">➡️<span>Derecha</span></button>
</div>

<div id="resTexto"></div>
</div>

<!-- MODAL RESUMEN -->

<div id="modal">
<div id="modalCard">
  <div id="modalEmoji">🏆</div>
  <div id="modalTitulo">NIVEL COMPLETO</div>
  <div id="modalEstrellas">⭐⭐⭐</div>
  <div id="modalStats"></div>
  <div id="modalMsg"></div>
  <div class="modalBtns">
    <button class="mbtn sec" onclick="reintentar()">🔄 Reintentar</button>
    <button class="mbtn pri" onclick="siguienteNivel()">Siguiente ▶</button>
  </div>
</div>
</div>

<script>
// =========================================================
// VOCABULARIO — 3 dificultades × 2 idiomas × 100+ palabras
// =========================================================
const VOCAB = {
  en: {
    facil: [
      // Animales básicos
      {cat:"🐾 Animales",w:"Dog 🐶",t:"Perro",o:["Perro","Gato","Pájaro","Pez"],ej:"The dog barks"},

      {cat:"🎨 Colores",w:"Red 🔴",t:"Rojo",o:["Rojo","Azul","Verde","Negro"],ej:"The apple is red"},

      {cat:"🔢 Números",w:"Ten 🔟",t:"Diez",o:["Diez","Nueve","Once","Ocho"],ej:"Count to ten"},
      // Familia
      {cat:"👨‍👩‍👧 Familia",w:"Mother",t:"Madre",o:["Madre","Padre","Hermana","Abuela"],ej:"My mother cooks"},
      {cat:"👨‍👩‍👧 Familia",w:"Father",t:"Padre",o:["Padre","Madre","Hermano","Abuelo"],ej:"My father works"},

      {cat:"💪 Cuerpo",w:"Hand ✋",t:"Mano",o:["Mano","Pie","Brazo","Dedo"],ej:"Raise your hand"},

      {cat:"💪 Cuerpo",w:"Mouth 👄",t:"Boca",o:["Boca","Nariz","Oído","Ojo"],ej:"Open your mouth"},
    ],
    medio: [
      // Naturaleza
      {cat:"🌿 Naturaleza",w:"Mountain ⛰️",t:"Montaña",o:["Montaña","Río","Mar","Bosque"],ej:"Climb the mountain"},
      {cat:"🌿 Naturaleza",w:"River 🌊",t:"Río",o:["Río","Lago","Mar","Océano"],ej:"The river flows"},

  estrellasTotal: 0,
  progreso: {}, // { 'bronco_0': {estrellas:3, pts:50}, ... }

  // Juego activo
  liga: null, nivelIdx: 0,
  cola: [], idxCola: 0,
  pregsRonda: 5, pregActual: 0,
  golesRonda: 0, ptsRonda: 0,
  historial: [],
  rachaActual: 0,
  respCorrecta: false,
  esperaDisparo: false,
  bloqueado: false,
  power: 0, powerDir: 1, powerInt: null,
};

// =========================================================
// GUARDADO LOCAL
// =========================================================
function guardar() {
  try {
    localStorage.setItem('penaltyIdiomas', JSON.stringify({
      puntajeTotal: G.puntajeTotal,
      estrellasTotal: G.estrellasTotal,
      progreso: G.progreso,
      lang: G.lang
    }));
  } catch(e){}
}
function cargar() {
  try {
    const d = JSON.parse(localStorage.getItem('penaltyIdiomas') || '{}');
    if(d.puntajeTotal) G.puntajeTotal = d.puntajeTotal;
    if(d.estrellasTotal) G.estrellasTotal = d.estrellasTotal;
    if(d.progreso) G.progreso = d.progreso;
    if(d.lang) G.lang = d.lang;
  } catch(e){}
}

// =========================================================
// MAPA
// =========================================================
function renderMapa() {
  document.querySelectorAll('.lbtn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lbtn.${G.lang}`).classList.add('active');
  document.getElementById('totalPts').textContent = G.puntajeTotal;
  document.getElementById('totalEstrellas').textContent = G.estrellasTotal;

  const cont = document.getElementById('mapContenido');
  cont.innerHTML = '';

  LIGAS.forEach(liga => {
    const desbloqueada = G.puntajeTotal >= liga.ptsDesbloqueo;
    const sec = document.createElement('div');
    sec.className = 'liga-section';

    const hdr = document.createElement('div');
    hdr.className = `liga-header ${liga.clase}`;
    hdr.innerHTML = `
      <div class="liga-icono">${liga.emoji}</div>
      <div class="liga-info">
        <h3>${liga.nombre} ${!desbloqueada ? '🔒' : ''}</h3>
        <p>${desbloqueada ? liga.desc : `Necesitas ${liga.ptsDesbloqueo} pts para desbloquear`}</p>
      </div>`;
    sec.appendChild(hdr);

    if(desbloqueada) {
      const grid = document.createElement('div');
      grid.className = 'niveles-grid';

      for(let i = 0; i < liga.niveles; i++) {
        const key = `${liga.id}_${i}`;
        const prog = G.progreso[key];
        const completado = prog && prog.estrellas > 0;
        const perfecto = prog && prog.estrellas === 3;

        // Determinar si disponible
        let disponible = (i === 0);
        if(i > 0) {
          const keyAnterior = `${liga.id}_${i-1}`;
          disponible = G.progreso[keyAnterior] && G.progreso[keyAnterior].estrellas > 0;
        }

        const card = document.createElement('div');
        const esActual = disponible && !completado;
        card.className = `nivel-card ${
          !disponible ? 'bloqueado' :
          perfecto ? 'perfecto' :
          completado ? 'completado' :
          esActual ? 'actual' : 'disponible'
        }`;

        const estrellas = prog ? '⭐'.repeat(prog.estrellas) + '☆'.repeat(3-prog.estrellas) : '☆☆☆';

        card.innerHTML = `
          <div class="nnum">${disponible ? (i+1) : ''}</div>
          <div class="nestrellas">${completado ? estrellas : ''}</div>
          ${!disponible ? '<div class="nbloqueo">🔒</div>' : ''}
          <div class="ntip">${liga.nombre} · Nivel ${i+1}</div>`;

        if(disponible) {
          card.onclick = () => iniciarJuego(liga, i);
        }
        grid.appendChild(card);
      }
      sec.appendChild(grid);
    }
    cont.appendChild(sec);
  });
}

// =========================================================
// INICIAR JUEGO
// =========================================================
function iniciarJuego(liga, nivelIdx) {
  G.liga = liga;
  G.nivelIdx = nivelIdx;
  G.pregsRonda = liga.pregsPorNivel;
  G.pregActual = 0;
  G.golesRonda = 0;
  G.ptsRonda = 0;
  G.historial = [];
  G.rachaActual = 0;

  // Preparar cola del idioma y dificultad
  const pool = [...(VOCAB[G.lang][liga.dif] || [])];
  // Barajar
  for(let i = pool.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  G.cola = pool;
  G.idxCola = 0;

  // UI
  document.getElementById('gameNivelLabel').textContent = `${liga.emoji} NIVEL ${nivelIdx+1}`;
  const difNames = {facil:'🟢 FÁCIL', medio:'🟡 MEDIO', dificil:'🔴 DIFÍCIL', experto:'💎 EXPERTO'};
  const difEl = document.getElementById('difLabel');
  difEl.textContent = difNames[liga.dif];
  difEl.className = '';
  difEl.id = 'difLabel';
  const difClases = {facil:'facil', medio:'medio', dificil:'dificil', experto:'experto'};
  difEl.classList.add(difClases[liga.dif]);

  showScreen('gameScreen');
  cargarPregunta();
  actualizarGameUI();
}

// =========================================================
// PREGUNTA
// =========================================================
function cargarPregunta() {
  if(G.idxCola >= G.cola.length) {
    // reiniciar cola barajada
    for(let i = G.cola.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [G.cola[i],G.cola[j]] = [G.cola[j],G.cola[i]];
    }
    G.idxCola = 0;
  }

  const w = G.cola[G.idxCola];
  G.respCorrecta = false;
  G.esperaDisparo = false;
  G.bloqueado = false;

  document.getElementById('catLabel').textContent = w.cat + ' — ¿Cómo se dice?';
  document.getElementById('wordBig').textContent = w.w;
  document.getElementById('wordEj').textContent = '"' + w.ej + '"';
  document.getElementById('resTexto').textContent = '';
  document.getElementById('resTexto').className = '';
  document.getElementById('comboDiv').textContent = '';
  document.getElementById('ptsFlotante').textContent = '';

  const opts = [...w.o].sort(() => Math.random()-0.5);
  const cont = document.getElementById('opciones');
  cont.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = () => elegir(opt, btn, w);
    cont.appendChild(btn);
  });

  document.getElementById('zonas').style.display = 'none';
  document.getElementById('powerSec').style.display = 'none';

  // Reset campo
  const balon = document.getElementById('balon');
  balon.style.left = '50%'; balon.style.transform = 'translateX(-50%)'; balon.style.bottom = '18px';
  document.getElementById('arquero').style.left = '50%'; document.getElementById('arquero').style.transform = 'translateX(-50%)';

  actualizarDots();
  actualizarGameUI();
}

function elegir(opt, btn, w) {
  if(G.bloqueado || G.esperaDisparo) return;
  G.respCorrecta = (opt === w.t);
  G.bloqueado = true;

  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if(b.textContent === w.t) b.classList.add('correcta');
    else if(b === btn && !G.respCorrecta) b.classList.add('incorrecta');
  });

  if(G.respCorrecta) {
    G.rachaActual++;
    lanzarEmojis(['⭐','✅','💯']);
    document.getElementById('resTexto').textContent = '¡Correcto! Ahora dispara 🎯';
    if(G.rachaActual >= 3) document.getElementById('comboDiv').textContent = `🔥 COMBO x${G.rachaActual}`;
  } else {
    G.rachaActual = 0;
    document.getElementById('resTexto').textContent = `Era "${w.t}" 😅 ¡Igual dispara!`;
  }
  actualizarGameUI();

  setTimeout(() => {
    G.esperaDisparo = true;
    document.getElementById('zonas').style.display = 'flex';
    document.getElementById('powerSec').style.display = 'block';
    iniciarPower();
  }, 500);
}

// =========================================================
// POWER BAR
// =========================================================
function iniciarPower() {
  G.power = 0; G.powerDir = 1;
  clearInterval(G.powerInt);
  const difs = {facil:55, medio:45, dificil:35, experto:28};
  const vel = difs[G.liga.dif] || 40;
  G.powerInt = setInterval(() => {
    G.power += G.powerDir * 4;
    if(G.power >= 100){ G.power = 100; G.powerDir = -1; }
    if(G.power <= 0){ G.power = 0; G.powerDir = 1; }
    const f = document.getElementById('powerFill');
    f.style.width = G.power + '%';
    if(G.power > 65) f.style.background = 'linear-gradient(90deg,#ef4444,#f97316)';
    else if(G.power > 35) f.style.background = 'linear-gradient(90deg,#fbbf24,#22c55e)';
    else f.style.background = 'linear-gradient(90deg,#64748b,#fbbf24)';
  }, vel);
}

// =========================================================
// DISPARO
// =========================================================
function disparar(dir) {
  if(!G.esperaDisparo) return;
  G.esperaDisparo = false;
  clearInterval(G.powerInt);
  document.getElementById('zonas').style.display = 'none';
  document.getElementById('powerSec').style.display = 'none';

  const pow = G.power;
  const dirs = ['izq','cen','der'];
  const arqueroDir = dirs[Math.floor(Math.random()*3)];

  const arq = document.getElementById('arquero');
  if(arqueroDir==='izq'){arq.style.left='18%';arq.style.transform='translateX(0)';}
  else if(arqueroDir==='cen'){arq.style.left='50%';arq.style.transform='translateX(-50%)';}
  else{arq.style.left='82%';arq.style.transform='translateX(-100%)';}

  const bal = document.getElementById('balon');
  if(dir==='izq'){bal.style.left='18%';bal.style.transform='translateX(0)';}
  else if(dir==='cen'){bal.style.left='50%';bal.style.transform='translateX(-50%)';}
  else{bal.style.left='82%';bal.style.transform='translateX(-100%)';}
  bal.style.bottom = '125px';

  const mismo = (dir===arqueroDir);
  const suficiente = pow >= 20;
  let gol = !mismo && suficiente && G.respCorrecta;
  if(!G.respCorrecta && !mismo && suficiente && Math.random()<0.25) gol = true;

  if(navigator.vibrate) navigator.vibrate(gol ? [80,40,80] : 150);

  setTimeout(() => {
    const res = document.getElementById('resTexto');
    let pts = 0;

    if(gol) {
      res.textContent = '⚽ ¡GOOOOOL! 🔥';
      res.className = 'gol';
      pts = G.respCorrecta ?
        10 + Math.floor(pow/10) + (G.rachaActual > 2 ? G.rachaActual * 3 : 0) :
        3;
      G.puntajeTotal += pts;
      G.ptsRonda += pts;
      G.golesRonda++;
      G.historial.push(true);
      lanzarEmojis(['⚽','🔥','🎉','💥','⭐']);
      document.getElementById('ptsFlotante').textContent = `+${pts} pts`;
    } else {
      res.textContent = pow < 20 ? '😴 ¡MÁS POTENCIA!' : '🧤 ¡ATAJADO!';
      res.className = 'fail';
      if(G.respCorrecta){ pts = 5; G.puntajeTotal += pts; G.ptsRonda += pts; document.getElementById('ptsFlotante').textContent = `+${pts} pts`; }
      G.historial.push(false);
    }

    actualizarGameUI();
    G.pregActual++;
    actualizarDotsPost(gol);

    setTimeout(() => {
      bal.style.bottom = '18px';
      if(G.pregActual >= G.pregsRonda) {
        setTimeout(mostrarModal, 800);
      } else {
        G.idxCola++;
        cargarPregunta();
      }
    }, 1200);
  }, 650);
}

// =========================================================
// MODAL RESUMEN
// =========================================================
function mostrarModal() {
  const porc = G.golesRonda / G.pregsRonda;
  const ests = porc >= 0.85 ? 3 : porc >= 0.55 ? 2 : porc >= 0.3 ? 1 : 0;

  // Guardar progreso
  const key = `${G.liga.id}_${G.nivelIdx}`;
  const prev = G.progreso[key];
  const nuevaEst = Math.max(ests, prev ? prev.estrellas : 0);
  const nuevaEs = !prev || nuevaEst > prev.estrellas;
  if(nuevaEs) G.estrellasTotal += (nuevaEst - (prev ? prev.estrellas : 0));
  G.progreso[key] = { estrellas: nuevaEst, pts: G.ptsRonda };
  guardar();

  const msgs = ['¡Sigue practicando! 💪','¡Bien hecho! 👍','¡Muy bien! ⭐','¡PERFECTO! 🏆'];
  const emojis = ['😤','👍','⭐','🏆'];
  document.getElementById('modalEmoji').textContent = emojis[ests];
  document.getElementById('modalTitulo').textContent = `NIVEL ${G.nivelIdx+1} LISTO`;
  document.getElementById('modalEstrellas').textContent = '⭐'.repeat(ests) + '☆'.repeat(3-ests);
  document.getElementById('modalStats').textContent = `⚽ Goles: ${G.golesRonda}/${G.pregsRonda} · 🎯 Puntos: ${G.ptsRonda}`;
  document.getElementById('modalMsg').textContent = msgs[ests];

  // Botón siguiente: habilitar si hay más niveles
  const btnSig = document.querySelector('.mbtn.pri');
  const hayMas = G.nivelIdx + 1 < G.liga.niveles;
  btnSig.style.display = hayMas ? 'block' : 'none';

  document.getElementById('modal').classList.add('open');
}

function reintentar() {
  document.getElementById('modal').classList.remove('open');
  iniciarJuego(G.liga, G.nivelIdx);
}

function siguienteNivel() {
  document.getElementById('modal').classList.remove('open');
  const nextIdx = G.nivelIdx + 1;
  if(nextIdx < G.liga.niveles) {
    iniciarJuego(G.liga, nextIdx);
  } else {
    volverMapa();
  }
}

function volverMapa() {
  clearInterval(G.powerInt);
  document.getElementById('modal').classList.remove('open');
  showScreen('mapScreen');
  renderMapa();
}

// =========================================================
// UI HELPERS
// =========================================================
function actualizarGameUI() {
  document.getElementById('gPts').textContent = G.puntajeTotal;
  document.getElementById('gRacha').textContent = G.rachaActual;
  const progPorc = (G.pregActual / G.pregsRonda) * 100;
  document.getElementById('progRondaFill').style.width = progPorc + '%';
  document.getElementById('progRondaTexto').textContent = `${G.pregActual}/${G.pregsRonda}`;
}

function actualizarDots() {
  const cont = document.getElementById('rachaDots');
  cont.innerHTML = '';
  for(let i=0; i<G.pregsRonda; i++) {
    const d = document.createElement('div');
    d.className = 'rdot';
    if(i < G.historial.length) d.classList.add(G.historial[i]?'ok':'fail');
    else if(i === G.historial.length) d.classList.add('now');
    cont.appendChild(d);
  }
}

function actualizarDotsPost(gol) {
  const dots = document.querySelectorAll('.rdot');
  const idx = G.historial.length - 1;
  if(dots[idx]){ dots[idx].classList.remove('now'); dots[idx].classList.add(gol?'ok':'fail'); }
  if(dots[idx+1]) dots[idx+1].classList.add('now');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function setLang(lang) {
  G.lang = lang;
  guardar();
  renderMapa();
}

function lanzarEmojis(lista) {
  lista.forEach((em,i) => setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'efloat';
    el.textContent = em;
    el.style.left = (15+Math.random()*70)+'vw';
    el.style.top = (20+Math.random()*50)+'vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }, i*100));
}

// =========================================================
// INICIO
// =========================================================
cargar();
renderMapa();
</script>

</body>
</html>

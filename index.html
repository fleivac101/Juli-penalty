<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Penalty Idiomas Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --amarillo: #fbbf24;
  --verde: #16a34a;
  --verde-claro: #22c55e;
  --rojo: #ef4444;
  --azul: #3b82f6;
  --gris: #94a3b8;
  --bg: #080c18;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:#f1f5f9;
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(22,163,74,.12) 0,transparent 55%),
    radial-gradient(ellipse at 85% 85%,rgba(59,130,246,.1) 0,transparent 55%);
  pointer-events:none;z-index:0;
}

.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ===== MAPA ===== */
#mapScreen{max-width:420px;margin:0 auto;padding:12px;}
#mapHeader{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px;}
#mapTitulo{
font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:2px;
background:linear-gradient(135deg,var(–amarillo),#f97316);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#mapStats{display:flex;gap:8px;}
.badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;}
.badge span{color:var(–amarillo);}

#langRow{display:flex;gap:8px;margin-bottom:14px;}
.lbtn{flex:1;padding:10px;border:2px solid transparent;border-radius:12px;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;color:#fff;}
.lbtn.en{background:rgba(0,48,135,.4);border-color:rgba(0,48,135,.6);}
.lbtn.it{background:rgba(0,140,69,.4);border-color:rgba(0,140,69,.6);}
.lbtn.active.en{background:#003087;border-color:#fff;box-shadow:0 0 15px rgba(0,48,135,.8);}
.lbtn.active.it{background:#008c45;border-color:#fff;box-shadow:0 0 15px rgba(0,140,69,.8);}

.liga-section{margin-bottom:18px;}
.liga-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 14px;border-radius:14px;}
.liga-header.bronco{background:linear-gradient(135deg,rgba(180,83,9,.3),rgba(120,53,15,.2));border:1px solid rgba(180,83,9,.4);}
.liga-header.plata{background:linear-gradient(135deg,rgba(100,116,139,.3),rgba(71,85,105,.2));border:1px solid rgba(100,116,139,.4);}
.liga-header.oro{background:linear-gradient(135deg,rgba(161,138,0,.3),rgba(120,90,0,.2));border:1px solid rgba(161,138,0,.4);}
.liga-header.diamante{background:linear-gradient(135deg,rgba(6,182,212,.3),rgba(8,145,178,.2));border:1px solid rgba(6,182,212,.4);}
.liga-icono{font-size:28px;}
.liga-info h3{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1px;}
.liga-info p{font-size:11px;color:var(–gris);text-transform:uppercase;letter-spacing:1px;}

.niveles-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 4px;}
.nivel-card{aspect-ratio:1;border-radius:14px;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;font-family:‘Bebas Neue’,sans-serif;}
.nivel-card.bloqueado{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);cursor:not-allowed;}
.nivel-card.bloqueado .nnum{color:rgba(255,255,255,.2);font-size:18px;}
.nivel-card.disponible{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);}
.nivel-card.disponible:hover{transform:scale(1.06);background:rgba(255,255,255,.14);}
.nivel-card.completado{border-color:var(–verde-claro);background:rgba(22,163,74,.15);}
.nivel-card.completado:hover{transform:scale(1.06);}
.nivel-card.perfecto{border-color:var(–amarillo);background:rgba(251,191,36,.15);}
.nivel-card.actual{border-color:var(–amarillo);background:rgba(251,191,36,.2);box-shadow:0 0 16px rgba(251,191,36,.4);animation:pulso .8s ease infinite alternate;}
@keyframes pulso{from{box-shadow:0 0 10px rgba(251,191,36,.3);}to{box-shadow:0 0 22px rgba(251,191,36,.6);}}
.nnum{font-size:20px;line-height:1;}
.nestrellas{font-size:10px;margin-top:2px;min-height:12px;}
.nbloqueo{font-size:16px;opacity:.3;}
.nivel-card .ntip{display:none;position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:3px 8px;font-size:10px;white-space:nowrap;color:#fff;z-index:10;pointer-events:none;}
.nivel-card:hover .ntip{display:block;}

/* ===== JUEGO ===== */
#gameScreen{max-width:420px;margin:0 auto;padding:10px;}
#gameHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 0 8px;}
#btnVolver{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 12px;color:#fff;font-size:13px;cursor:pointer;font-family:‘Nunito’,sans-serif;font-weight:700;}
#gameInfo{text-align:right;}
#gameNivelLabel{font-family:‘Bebas Neue’,sans-serif;font-size:16px;color:var(–amarillo);letter-spacing:1px;}
#gameStats2{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}

#difBarra{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 12px;border-radius:10px;background:rgba(255,255,255,.05);}
#difLabel{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
#difLabel.facil{color:#22c55e;}
#difLabel.medio{color:#fbbf24;}
#difLabel.dificil{color:#ef4444;}
#difLabel.experto{color:#a855f7;}
#progRondaBar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
#progRondaFill{height:100%;background:linear-gradient(90deg,var(–amarillo),#f97316);border-radius:3px;transition:width .4s ease;}
#progRondaTexto{font-size:11px;color:var(–gris);white-space:nowrap;}

#tarjeta{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;margin:8px 0;text-align:center;}
#catLabel{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(–gris);margin-bottom:4px;}
#wordBig{font-family:‘Bebas Neue’,sans-serif;font-size:44px;letter-spacing:3px;line-height:1.1;margin-bottom:2px;}
#wordEj{font-size:12px;color:var(–gris);font-style:italic;}

#opciones{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.opt{padding:13px 8px;border:2px solid rgba(255,255,255,.15);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;font-family:‘Nunito’,sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:scale(1.03);}
.opt.correcta{background:rgba(22,163,74,.5);border-color:var(–verde-claro);box-shadow:0 0 20px rgba(22,163,74,.5);animation:popVerde .4s ease;}
.opt.incorrecta{background:rgba(239,68,68,.4);border-color:var(–rojo);animation:shake .4s ease;}
@keyframes popVerde{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

#ptsFlotante{text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:22px;min-height:28px;color:var(–amarillo);}

#powerSec{display:none;margin:6px 0;}
#powerLbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–gris);margin-bottom:4px;text-align:center;}
#powerWrap{height:20px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
#powerFill{height:100%;width:0%;border-radius:10px;transition:width .04s;}

#rachaDots{display:flex;justify-content:center;gap:5px;margin:5px 0;min-height:16px;}
.rdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
.rdot.ok{background:var(–verde-claro);box-shadow:0 0 6px var(–verde-claro);}
.rdot.fail{background:var(–rojo);box-shadow:0 0 6px var(–rojo);}
.rdot.now{background:var(–amarillo);box-shadow:0 0 8px var(–amarillo);animation:pulso .6s infinite alternate;}

/* ===== CANCHA MEJORADA ===== */
#canchaWrap{
position:relative;
width:100%;max-width:400px;
margin:8px auto;
perspective:600px;
}
#cancha{
width:100%;height:200px;
background:linear-gradient(180deg,#14532d 0%,#166534 30%,#15803d 60%,#16a34a 100%);
border-radius:16px;position:relative;overflow:hidden;
border:3px solid rgba(255,255,255,.2);
transition:transform .15s ease;
}
/* Líneas del campo */
#cancha::after{
content:’’;position:absolute;bottom:0;left:10%;right:10%;
height:58px;border:2px solid rgba(255,255,255,.25);border-top:none;border-radius:0 0 8px 8px;
}
/* Césped degradado */
.grass-lines{
position:absolute;inset:0;
background:repeating-linear-gradient(
0deg,
transparent,transparent 20px,
rgba(0,0,0,.06) 20px,rgba(0,0,0,.06) 40px
);
pointer-events:none;
}

#arco{
position:absolute;top:-10px;left:50%;transform:translateX(-50%);
width:160px;height:70px;border:5px solid white;border-bottom:none;
border-radius:4px 4px 0 0;background:rgba(255,255,255,.05);z-index:2;
box-shadow:0 0 20px rgba(255,255,255,.1);
}
/* Red del arco */
#arco::after{
content:’’;position:absolute;inset:0;
background-image:linear-gradient(rgba(255,255,255,.15) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px);
background-size:14px 12px;
}
/* Flash de la red al hacer gol */
#arco.gol-flash{
animation:redFlash .5s ease;
}
@keyframes redFlash{
0%{background:rgba(255,255,255,.05);}
30%{background:rgba(255,255,0,.4);box-shadow:0 0 40px rgba(255,220,0,.8),inset 0 0 30px rgba(255,220,0,.5);}
100%{background:rgba(255,255,255,.05);}
}

#arquero{
position:absolute;top:14px;left:50%;transform:translateX(-50%);
font-size:34px;transition:left .35s cubic-bezier(.34,1.56,.64,1),transform .35s,font-size .2s;
z-index:3;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));
transform-origin:center bottom;
}
#arquero.save-anim{
animation:saveJump .5s ease;
}
@keyframes saveJump{
0%{transform:translateX(-50%) scaleX(1);}
30%{transform:translateX(-50%) scale(1.4) rotate(-5deg);}
60%{transform:translateX(-50%) scale(1.5) rotate(5deg);}
100%{transform:translateX(-50%) scaleX(1);}
}
#arquero.miss-anim{
animation:missFlop .5s ease;
}
@keyframes missFlop{
0%,100%{transform:translateX(-50%);}
50%{transform:translateX(-50%) translateY(6px) rotate(15deg);}
}

/* Balón con trayectoria animada */
#balon{
position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
font-size:28px;z-index:4;
filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));
transition:none; /* controlado por JS */
transform-origin:center;
}
#balon.kick{
animation:balonKick var(–kick-dur, .55s) cubic-bezier(.2,.8,.4,1) forwards;
}
/* Trayectoria con arco */
@keyframes balonKick{
0%{transform:translateX(-50%) scale(1) rotate(0deg);}
40%{transform:translateX(var(–bx-mid, -50%)) translateY(var(–by-mid, -60px)) scale(0.9) rotate(180deg);}
100%{transform:translateX(var(–bx-end, -50%)) translateY(var(–by-end, -130px)) scale(0.6) rotate(540deg);}
}
#balon.saved{
animation:balonSaved .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes balonSaved{
0%{transform:translateX(var(–bx-end,-50%)) translateY(var(–by-end,-130px)) scale(0.6);}
60%{transform:translateX(calc(var(–bx-end,-50%) + 20px)) translateY(-80px) scale(0.9) rotate(-90deg);}
100%{transform:translateX(calc(var(–bx-end,-50%) + 60px)) translateY(0px) scale(1) rotate(0deg);}
}

/* Humo/partículas del disparo */
.kick-particle{
position:absolute;pointer-events:none;z-index:5;
font-size:18px;
animation:particleFloat 0.8s ease-out forwards;
}
@keyframes particleFloat{
0%{opacity:1;transform:translate(0,0) scale(1);}
100%{opacity:0;transform:translate(var(–px,20px),var(–py,-60px)) scale(.3);}
}

/* Efecto de cámara shake */
#canchaWrap.shake{animation:cameraShake .4s ease;}
@keyframes cameraShake{
0%,100%{transform:translateX(0) translateY(0);}
20%{transform:translateX(-4px) translateY(2px);}
40%{transform:translateX(4px) translateY(-3px);}
60%{transform:translateX(-3px) translateY(1px);}
80%{transform:translateX(3px) translateY(-1px);}
}

/* Zoom al portero */
#canchaWrap.zoom-gk #arquero{font-size:48px;transition:font-size .2s;}
#canchaWrap.zoom-gk .zoom-overlay{opacity:1;}
.zoom-overlay{
position:absolute;inset:0;border-radius:14px;
background:linear-gradient(0deg,rgba(0,0,0,.5) 0%,transparent 50%);
opacity:0;transition:opacity .3s;pointer-events:none;
}

/* Marcador tipo TV */
#scoreboard{
position:absolute;top:8px;right:8px;z-index:6;
background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);
border-radius:8px;padding:3px 8px;
font-family:‘Bebas Neue’,sans-serif;font-size:16px;letter-spacing:1px;
color:white;
backdrop-filter:blur(4px);
}
#scoreboard .gol-count{color:var(–amarillo);}

/* Ondas expansivas al gol */
.gol-ring{
position:absolute;border-radius:50%;
border:3px solid rgba(255,220,0,.8);
pointer-events:none;
animation:expandRing .8s ease-out forwards;
}
@keyframes expandRing{
0%{width:10px;height:10px;opacity:1;transform:translate(-50%,-50%) scale(1);}
100%{width:180px;height:180px;opacity:0;transform:translate(-50%,-50%) scale(1);}
}

/* Texto en cancha */
#canchaMsg{
position:absolute;bottom:0;left:0;right:0;
text-align:center;padding:6px;
font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:3px;
opacity:0;transition:opacity .3s;z-index:8;
text-shadow:0 2px 8px rgba(0,0,0,.9);
}
#canchaMsg.show{opacity:1;}
#canchaMsg.gol{color:#fde047;text-shadow:0 0 20px rgba(253,224,71,.8),0 2px 8px rgba(0,0,0,.9);}
#canchaMsg.fail{color:#f87171;}

/* ===== ZONAS ===== */
#zonas{display:flex;gap:8px;margin:6px 0;display:none;}
.zbtn{
flex:1;padding:14px 4px;border:2px solid rgba(255,255,255,.2);border-radius:12px;
background:rgba(255,255,255,.07);color:#fff;font-size:22px;cursor:pointer;transition:all .2s;
font-family:‘Nunito’,sans-serif;font-weight:700;
position:relative;overflow:hidden;
}
.zbtn::before{
content:’’;position:absolute;inset:0;
background:radial-gradient(circle at center,rgba(255,255,255,.2),transparent 70%);
opacity:0;transition:opacity .2s;
}
.zbtn:hover::before{opacity:1;}
.zbtn:hover{border-color:rgba(255,255,255,.5);transform:scale(1.05);}
.zbtn:active{transform:scale(.97);}
.zbtn span{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(–gris);margin-top:2px;}

#resTexto{text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:36px;letter-spacing:3px;min-height:46px;transition:all .3s;}
#resTexto.gol{color:var(–verde-claro);text-shadow:0 0 30px rgba(34,197,94,.8);}
#resTexto.fail{color:var(–rojo);text-shadow:0 0 20px rgba(239,68,68,.6);}
#comboDiv{text-align:center;font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–amarillo);min-height:24px;letter-spacing:2px;}

/* ===== MODAL ===== */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;justify-content:center;align-items:center;}
#modal.open{display:flex;}
#modalCard{
background:linear-gradient(135deg,#0f2444,#080c18);
border:2px solid var(–amarillo);border-radius:24px;
padding:32px 28px;text-align:center;width:320px;max-width:90vw;
animation:entrada .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes entrada{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
#modalEmoji{font-size:50px;margin-bottom:8px;}
#modalTitulo{font-family:‘Bebas Neue’,sans-serif;font-size:32px;color:var(–amarillo);letter-spacing:2px;}
#modalEstrellas{font-size:28px;margin:8px 0;}
#modalStats{font-size:15px;color:var(–gris);margin:6px 0;}
#modalMsg{font-size:16px;font-weight:700;margin:8px 0 16px;}
.modalBtns{display:flex;gap:10px;justify-content:center;}
.mbtn{padding:12px 22px;border:none;border-radius:50px;font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.mbtn.pri{background:linear-gradient(135deg,var(–amarillo),#f97316);color:#080c18;}
.mbtn.sec{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.mbtn:hover{transform:scale(1.05);}

.efloat{position:fixed;font-size:26px;pointer-events:none;animation:flotar 1.2s ease-out forwards;z-index:100;}
@keyframes flotar{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-110px) scale(1.5);}}
</style>

</head>
<body>

<!-- MAPA -->

<div id="mapScreen" class="screen active">
<div id="mapHeader">
  <div id="mapTitulo">⚽ PENALTY IDIOMAS</div>
  <div id="mapStats">
    <div class="badge">🎯 <span id="totalPts">0</span></div>
    <div class="badge">⭐ <span id="totalEstrellas">0</span></div>
  </div>
</div>
<div id="langRow">
  <button class="lbtn en active" onclick="setLang('en')">🇬🇧 Inglés</button>
  <button class="lbtn it" onclick="setLang('it')">🇮🇹 Italiano</button>
</div>
<div id="mapContenido"></div>
</div>

<!-- JUEGO -->

<div id="gameScreen" class="screen">
<div id="gameHeader">
  <button id="btnVolver" onclick="volverMapa()">← Mapa</button>
  <div id="gameInfo">
    <div id="gameNivelLabel">NIVEL 1</div>
    <div id="gameStats2">
      <div class="badge">🎯 <span id="gPts">0</span></div>
      <div class="badge">🔥 <span id="gRacha">0</span></div>
    </div>
  </div>
</div>

<div id="difBarra">
  <div id="difLabel">FÁCIL</div>
  <div id="progRondaBar"><div id="progRondaFill" style="width:0%"></div></div>
  <div id="progRondaTexto">0/5</div>
</div>

<div id="tarjeta">
  <div id="catLabel">CATEGORÍA</div>
  <div id="wordBig">...</div>
  <div id="wordEj"></div>
</div>

<div id="opciones"></div>
<div id="comboDiv"></div>
<div id="ptsFlotante"></div>

<div id="powerSec">
  <div id="powerLbl">💥 POTENCIA DEL DISPARO</div>
  <div id="powerWrap"><div id="powerFill"></div></div>
</div>

<div id="rachaDots"></div>

<!-- CANCHA MEJORADA -->

<div id="canchaWrap">
  <div id="cancha">
    <div class="grass-lines"></div>
    <div id="arco"></div>
    <div id="arquero">🧤</div>
    <div id="balon">⚽</div>
    <div id="canchaMsg"></div>
    <div class="zoom-overlay"></div>
    <div id="scoreboard">⚽ <span class="gol-count" id="sbGoles">0</span>/<span id="sbTotal">5</span></div>
  </div>
</div>

<div id="zonas">
  <button class="zbtn" onclick="disparar('izq')">⬅️<span>Izquierda</span></button>
  <button class="zbtn" onclick="disparar('cen')">⬆️<span>Centro</span></button>
  <button class="zbtn" onclick="disparar('der')">➡️<span>Derecha</span></button>
</div>

<div id="resTexto"></div>
</div>

<!-- MODAL -->

<div id="modal">
<div id="modalCard">
  <div id="modalEmoji">🏆</div>
  <div id="modalTitulo">NIVEL COMPLETO</div>
  <div id="modalEstrellas">⭐⭐⭐</div>
  <div id="modalStats"></div>
  <div id="modalMsg"></div>
  <div class="modalBtns">
    <button class="mbtn sec" onclick="reintentar()">🔄 Reintentar</button>
    <button class="mbtn pri" onclick="siguienteNivel()">Siguiente ▶</button>
  </div>
</div>
</div>

<script>
// =========================================================
// WEB AUDIO — sonidos procedurales
// =========================================================
let audioCtx = null;
function getAudio(){
  if(!audioCtx) try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  return audioCtx;
}
function playTone(freq,type,dur,vol=0.4,delay=0){
  const ctx = getAudio(); if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
  osc.frequency.exponentialRampToValueAtTime(freq*0.5, ctx.currentTime+delay+dur);
  gain.gain.setValueAtTime(vol, ctx.currentTime+delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
  osc.start(ctx.currentTime+delay); osc.stop(ctx.currentTime+delay+dur+0.01);
}
function soundKick(){
  // Bajo impacto + silbido breve
  playTone(120,'sine',.15,.5);
  playTone(800,'sine',.08,.3,.05);
  playTone(400,'square',.1,.2,.03);
}
function soundGol(){
  // Fanfarria ascendente
  [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',.25,.35,i*.1));
  playTone(200,'sine',.4,.3,.0);
}
function soundSave(){
  // Descenso + metal
  playTone(600,'sawtooth',.3,.3);
  playTone(300,'square',.2,.2,.1);
}
function soundCorrect(){
  playTone(880,'sine',.15,.25);
  playTone(1100,'sine',.15,.2,.1);
}
function soundWrong(){
  playTone(200,'sawtooth',.25,.3);
}

function renderMapa(){
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lbtn.${G.lang}`).classList.add('active');
  document.getElementById('totalPts').textContent=G.puntajeTotal;
  document.getElementById('totalEstrellas').textContent=G.estrellasTotal;
  const cont=document.getElementById('mapContenido');
  cont.innerHTML='';
  LIGAS.forEach(liga=>{
    const desbloqueada=G.puntajeTotal>=liga.ptsDesbloqueo;
    const sec=document.createElement('div');sec.className='liga-section';
    const hdr=document.createElement('div');hdr.className=`liga-header ${liga.clase}`;
    hdr.innerHTML=`<div class="liga-icono">${liga.emoji}</div><div class="liga-info"><h3>${liga.nombre} ${!desbloqueada?'🔒':''}</h3><p>${desbloqueada?liga.desc:`Necesitas ${liga.ptsDesbloqueo} pts`}</p></div>`;
    sec.appendChild(hdr);
    if(desbloqueada){
      const grid=document.createElement('div');grid.className='niveles-grid';
      for(let i=0;i<liga.niveles;i++){
        const key=`${liga.id}_${i}`;const prog=G.progreso[key];
        const completado=prog&&prog.estrellas>0;const perfecto=prog&&prog.estrellas===3;
        let disponible=(i===0);
        if(i>0){const kA=`${liga.id}_${i-1}`;disponible=G.progreso[kA]&&G.progreso[kA].estrellas>0;}
        const card=document.createElement('div');
        const esActual=disponible&&!completado;
        card.className=`nivel-card ${!disponible?'bloqueado':perfecto?'perfecto':completado?'completado':esActual?'actual':'disponible'}`;
        const est=prog?'⭐'.repeat(prog.estrellas)+'☆'.repeat(3-prog.estrellas):'☆☆☆';
        card.innerHTML=`<div class="nnum">${disponible?(i+1):''}</div><div class="nestrellas">${completado?est:''}</div>${!disponible?'<div class="nbloqueo">🔒</div>':''}<div class="ntip">${liga.nombre} · Nivel ${i+1}</div>`;
        if(disponible)card.onclick=()=>iniciarJuego(liga,i);
        grid.appendChild(card);
      }
      sec.appendChild(grid);
    }
    cont.appendChild(sec);
  });
}

function iniciarJuego(liga,nivelIdx){
  G.liga=liga;G.nivelIdx=nivelIdx;G.pregsRonda=liga.pregsPorNivel;
  G.pregActual=0;G.golesRonda=0;G.ptsRonda=0;G.historial=[];G.rachaActual=0;
  const pool=[...(VOCAB[G.lang][liga.dif]||[])];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  G.cola=pool;G.idxCola=0;
  document.getElementById('gameNivelLabel').textContent=`${liga.emoji} NIVEL ${nivelIdx+1}`;
  const difNames={facil:'🟢 FÁCIL',medio:'🟡 MEDIO',dificil:'🔴 DIFÍCIL',experto:'💎 EXPERTO'};
  const difEl=document.getElementById('difLabel');
  difEl.textContent=difNames[liga.dif];difEl.className='';difEl.id='difLabel';
  difEl.classList.add({facil:'facil',medio:'medio',dificil:'dificil',experto:'experto'}[liga.dif]);
  document.getElementById('sbTotal').textContent=liga.pregsPorNivel;
  document.getElementById('sbGoles').textContent='0';
  showScreen('gameScreen');
  cargarPregunta();actualizarGameUI();
}

function cargarPregunta(){
  if(G.idxCola>=G.cola.length){
    for(let i=G.cola.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[G.cola[i],G.cola[j]]=[G.cola[j],G.cola[i]];}
    G.idxCola=0;
  }
  const w=G.cola[G.idxCola];
  G.respCorrecta=false;G.esperaDisparo=false;G.bloqueado=false;G.kickDir=null;
  document.getElementById('catLabel').textContent=w.cat+' — ¿Cómo se dice?';
  document.getElementById('wordBig').textContent=w.w;
  document.getElementById('wordEj').textContent='"'+w.ej+'"';
  document.getElementById('resTexto').textContent='';document.getElementById('resTexto').className='';
  document.getElementById('comboDiv').textContent='';document.getElementById('ptsFlotante').textContent='';

  const opts=[...w.o].sort(()=>Math.random()-.5);
  const cont=document.getElementById('opciones');cont.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt';btn.textContent=opt;
    btn.onclick=()=>elegir(opt,btn,w);cont.appendChild(btn);
  });
  document.getElementById('zonas').style.display='none';
  document.getElementById('powerSec').style.display='none';

  // Reset balón y portero
  resetCampo();
  actualizarDots();actualizarGameUI();
}

function resetCampo(){
  const balon=document.getElementById('balon');
  balon.style.transition='none';
  balon.className='';balon.textContent='⚽';
  balon.style.cssText='position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:28px;z-index:4;filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));';
  const arq=document.getElementById('arquero');
  arq.className='';arq.style.cssText='position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:34px;transition:left .35s cubic-bezier(.34,1.56,.64,1),transform .35s,font-size .2s;z-index:3;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));';
  document.getElementById('canchaMsg').textContent='';
  document.getElementById('canchaMsg').className='';
  document.getElementById('arco').className='';
  document.getElementById('canchaWrap').className='';
}

function elegir(opt,btn,w){
  if(G.bloqueado||G.esperaDisparo)return;
  G.respCorrecta=(opt===w.t);G.bloqueado=true;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===w.t)b.classList.add('correcta');
    else if(b===btn&&!G.respCorrecta)b.classList.add('incorrecta');
  });
  if(G.respCorrecta){
    G.rachaActual++;soundCorrect();lanzarEmojis(['⭐','✅','💯']);
    document.getElementById('resTexto').textContent='¡Correcto! Ahora dispara 🎯';
    if(G.rachaActual>=3)document.getElementById('comboDiv').textContent=`🔥 COMBO x${G.rachaActual}`;
  }else{
    G.rachaActual=0;soundWrong();
    document.getElementById('resTexto').textContent=`Era "${w.t}" 😅 ¡Igual dispara!`;
  }
  actualizarGameUI();
  setTimeout(()=>{G.esperaDisparo=true;document.getElementById('zonas').style.display='flex';document.getElementById('powerSec').style.display='block';iniciarPower();},500);
}

// =========================================================
// POWER
// =========================================================
function iniciarPower(){
  G.power=0;G.powerDir=1;clearInterval(G.powerInt);
  const vel={facil:55,medio:45,dificil:35,experto:28}[G.liga.dif]||40;
  G.powerInt=setInterval(()=>{
    G.power+=G.powerDir*4;
    if(G.power>=100){G.power=100;G.powerDir=-1;}
    if(G.power<=0){G.power=0;G.powerDir=1;}
    const f=document.getElementById('powerFill');
    f.style.width=G.power+'%';
    if(G.power>65)f.style.background='linear-gradient(90deg,#ef4444,#f97316)';
    else if(G.power>35)f.style.background='linear-gradient(90deg,#fbbf24,#22c55e)';
    else f.style.background='linear-gradient(90deg,#64748b,#fbbf24)';
  },vel);
}

// =========================================================
// DISPARO — animación mejorada
// =========================================================
function disparar(dir){
  if(!G.esperaDisparo)return;
  G.esperaDisparo=false;G.kickDir=dir;
  clearInterval(G.powerInt);
  document.getElementById('zonas').style.display='none';
  document.getElementById('powerSec').style.display='none';

  const pow=G.power;
  const dirs=['izq','cen','der'];
  const arqueroDir=dirs[Math.floor(Math.random()*3)];
  soundKick();
  spawnKickParticles();

  // Mover portero
  const arq=document.getElementById('arquero');
  let arqLeft,arqTx;
  if(arqueroDir==='izq'){arqLeft='18%';arqTx='translateX(0)';}
  else if(arqueroDir==='cen'){arqLeft='50%';arqTx='translateX(-50%)';}
  else{arqLeft='82%';arqTx='translateX(-100%)';}
  arq.style.left=arqLeft;arq.style.transform=arqTx;

  // Calcular destino del balón
  let bxEnd,byEnd,bxMid,byMid;
  if(dir==='izq'){bxEnd='calc(18% - 50%)';byEnd='-135px';}
  else if(dir==='cen'){bxEnd='0%';byEnd='-140px';}
  else{bxEnd='calc(82% - 50%)';byEnd='-130px';}
  // Punto medio con arco
  const mx={izq:'calc(5% - 50%)',cen:'-5%',der:'calc(70% - 50%)'}[dir];
  byMid='-70px';

  const balon=document.getElementById('balon');
  balon.style.setProperty('--bx-mid',mx);
  balon.style.setProperty('--by-mid',byMid);
  balon.style.setProperty('--bx-end',bxEnd);
  balon.style.setProperty('--by-end',byEnd);
  balon.style.setProperty('--kick-dur','.55s');
  balon.classList.add('kick');

  // Determinar gol
  const mismo=(dir===arqueroDir);
  const suficiente=pow>=20;
  let gol=!mismo&&suficiente&&G.respCorrecta;
  if(!G.respCorrecta&&!mismo&&suficiente&&Math.random()<0.25)gol=true;

  if(navigator.vibrate)navigator.vibrate(gol?[80,40,80]:150);

  setTimeout(()=>{
    const res=document.getElementById('resTexto');
    let pts=0;
    if(gol){
      res.textContent='⚽ ¡GOOOOOL! 🔥';res.className='gol';
      soundGol();
      flashRed();addGolRing();
      showCanchaMsg('GOOOL!','gol');
      document.getElementById('canchaWrap').classList.add('shake');
      pts=G.respCorrecta?10+Math.floor(pow/10)+(G.rachaActual>2?G.rachaActual*3:0):3;
      G.puntajeTotal+=pts;G.ptsRonda+=pts;G.golesRonda++;G.historial.push(true);
      lanzarEmojis(['⚽','🔥','🎉','💥','⭐']);
      document.getElementById('ptsFlotante').textContent=`+${pts} pts`;
      arq.classList.add('miss-anim');
      document.getElementById('sbGoles').textContent=G.golesRonda;
    }else{
      res.textContent=pow<20?'😴 ¡MÁS POTENCIA!':'🧤 ¡ATAJADO!';res.className='fail';
      soundSave();
      showCanchaMsg(pow<20?'DÉBIL':'ATAJADO','fail');
      if(pow>=20){
        arq.classList.add('save-anim');
        // rebote del balón
        setTimeout(()=>balon.classList.add('saved'),100);
      }
      if(G.respCorrecta){pts=5;G.puntajeTotal+=pts;G.ptsRonda+=pts;document.getElementById('ptsFlotante').textContent=`+${pts} pts`;}
      G.historial.push(false);
    }
    actualizarGameUI();G.pregActual++;actualizarDotsPost(gol);
    setTimeout(()=>{
      if(G.pregActual>=G.pregsRonda){setTimeout(mostrarModal,800);}
      else{G.idxCola++;cargarPregunta();}
    },1400);
  },600);
}

// EFECTOS VISUALES CANCHA
// =========================================================
function flashRed(){
  const arco=document.getElementById('arco');
  arco.classList.add('gol-flash');
  setTimeout(()=>arco.classList.remove('gol-flash'),600);
}

function addGolRing(){
  const wrap=document.getElementById('cancha');
  const ring=document.createElement('div');
  ring.className='gol-ring';
  ring.style.left='50%';ring.style.top='40%';ring.style.position='absolute';
  wrap.appendChild(ring);
  setTimeout(()=>ring.remove(),900);
}

function showCanchaMsg(txt,cls){
  const el=document.getElementById('canchaMsg');
  el.textContent=txt;el.className=`show ${cls}`;
  setTimeout(()=>{el.className='';el.textContent='';},900);
}

function spawnKickParticles(){
  const wrap=document.getElementById('cancha');
  const emojis=['💨','✨','🌟','⚡'];
  for(let i=0;i<5;i++){
    const p=document.createElement('div');
    p.className='kick-particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const px=(Math.random()-0.5)*80;const py=-(30+Math.random()*50);
    p.style.setProperty('--px',px+'px');p.style.setProperty('--py',py+'px');
    p.style.left=(40+Math.random()*20)+'%';p.style.bottom='30px';
    wrap.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
}

// MODAL
// =========================================================
function mostrarModal(){
  const porc=G.golesRonda/G.pregsRonda;
  const ests=porc>=0.85?3:porc>=0.55?2:porc>=0.3?1:0;
  const key=`${G.liga.id}_${G.nivelIdx}`;const prev=G.progreso[key];
  const nuevaEst=Math.max(ests,prev?prev.estrellas:0);
  if(!prev||nuevaEst>prev.estrellas)G.estrellasTotal+=(nuevaEst-(prev?prev.estrellas:0));
  G.progreso[key]={estrellas:nuevaEst,pts:G.ptsRonda};guardar();
  const msgs=['¡Sigue practicando! 💪','¡Bien hecho! 👍','¡Muy bien! ⭐','¡PERFECTO! 🏆'];
  const emojis=['😤','👍','⭐','🏆'];
  document.getElementById('modalEmoji').textContent=emojis[ests];
  document.getElementById('modalTitulo').textContent=`NIVEL ${G.nivelIdx+1} LISTO`;
  document.getElementById('modalEstrellas').textContent='⭐'.repeat(ests)+'☆'.repeat(3-ests);
  document.getElementById('modalStats').textContent=`⚽ Goles: ${G.golesRonda}/${G.pregsRonda} · 🎯 Puntos: ${G.ptsRonda}`;
  document.getElementById('modalMsg').textContent=msgs[ests];
  const btnSig=document.querySelector('.mbtn.pri');
  btnSig.style.display=G.nivelIdx+1<G.liga.niveles?'block':'none';
  document.getElementById('modal').classList.add('open');
}
function reintentar(){document.getElementById('modal').classList.remove('open');iniciarJuego(G.liga,G.nivelIdx);}
function siguienteNivel(){document.getElementById('modal').classList.remove('open');const n=G.nivelIdx+1;if(n<G.liga.niveles)iniciarJuego(G.liga,n);else volverMapa();}
function volverMapa(){clearInterval(G.powerInt);document.getElementById('modal').classList.remove('open');showScreen('mapScreen');renderMapa();}

// =========================================================
// UI HELPERS
// =========================================================
function actualizarGameUI(){
  document.getElementById('gPts').textContent=G.puntajeTotal;
  document.getElementById('gRacha').textContent=G.rachaActual;
  const p=(G.pregActual/G.pregsRonda)*100;
  document.getElementById('progRondaFill').style.width=p+'%';
  document.getElementById('progRondaTexto').textContent=`${G.pregActual}/${G.pregsRonda}`;
}
function actualizarDots(){
  const cont=document.getElementById('rachaDots');cont.innerHTML='';
  for(let i=0;i<G.pregsRonda;i++){
    const d=document.createElement('div');d.className='rdot';
    if(i<G.historial.length)d.classList.add(G.historial[i]?'ok':'fail');
    else if(i===G.historial.length)d.classList.add('now');
    cont.appendChild(d);
  }
}
function actualizarDotsPost(gol){
  const dots=document.querySelectorAll('.rdot');
  const idx=G.historial.length-1;
  if(dots[idx]){dots[idx].classList.remove('now');dots[idx].classList.add(gol?'ok':'fail');}
  if(dots[idx+1])dots[idx+1].classList.add('now');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function setLang(lang){G.lang=lang;guardar();renderMapa();}
function lanzarEmojis(lista){
  lista.forEach((em,i)=>setTimeout(()=>{
    const el=document.createElement('div');el.className='efloat';el.textContent=em;
    el.style.left=(15+Math.random()*70)+'vw';el.style.top=(20+Math.random()*50)+'vh';
    document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
  },i*100));
}

// =========================================================
// INICIO
// =========================================================
cargar();
renderMapa();
</script>
